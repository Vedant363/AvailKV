# Node identity
node.id=${NODE_ID:node1}
server.port=${NODE_PORT:8081}

# Peer URLs
peer.urls=${PEER_URLS:http://localhost:8082,http://localhost:8083}

# Actuator
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=always

# WAL
# wal.path=${WAL_PATH:writeAheadLog.txt}
wal.path=data/${NODE_ID}-wal.txt

# Ollama
ollama.url=${OLLAMA_URL:http://localhost:11434}
ollama.model=${OLLAMA_MODEL:gemma2:2b}