spring.application.name=availkv
# ?? Node identity ?????????????????????????????????????????????
# Each node gets its own ID and port at startup.
# In Phase 5 these are overridden by Docker environment variables.
node.id=${NODE_ID:node1}
server.port=${NODE_PORT:8081}

# ?? Peer URLs ??????????????????????????????????????????????????
# Comma-separated list of OTHER nodes' base URLs.
# node1 should list node2 and node3 here, and so on.
# Phase 2's PeerClient reads this to know who to heartbeat/vote with.
peer.urls=${PEER_URLS:http://localhost:8082,http://localhost:8083}

# ?? Actuator ???????????????????????????????????????????????????
# Expose health + metrics endpoints over HTTP.
# /actuator/health  ? liveness check
# /actuator/metrics ? JVM memory, thread count, request counts
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=always